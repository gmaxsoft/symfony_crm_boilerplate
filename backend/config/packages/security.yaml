security:
    password_hashers:
        App\Modules\Admin\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Modules\Admin\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/dashboard,  roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/customers,  roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/admin,      roles: ROLE_ADMINISTRATOR }
        - { path: ^/api/access,     roles: ROLE_ADMINISTRATOR }

when@test:
    security:
        password_hashers:
            App\Modules\Admin\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
