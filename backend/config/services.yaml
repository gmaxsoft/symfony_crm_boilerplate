# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # -------------------------------------------------------------------------
    # Shared kernel — klasy pomocnicze, value objects, wyjątki, traity
    # -------------------------------------------------------------------------
    App\Shared\:
        resource: '../src/Shared/'

    # -------------------------------------------------------------------------
    # Moduły — każdy moduł rejestrowany osobno dla przejrzystości
    # Symfony automatycznie rozpoznaje kontrolery, komendy, event-subscribery
    # na podstawie interfejsów i atrybutów dzięki autoconfigure: true
    # -------------------------------------------------------------------------
    App\Modules\User\:
        resource: '../src/Modules/User/'
        exclude:
            - '../src/Modules/User/Entity/'
            - '../src/Modules/User/DTO/'

    App\Modules\Contact\:
        resource: '../src/Modules/Contact/'
        exclude:
            - '../src/Modules/Contact/Entity/'
            - '../src/Modules/Contact/DTO/'

    App\Modules\Company\:
        resource: '../src/Modules/Company/'
        exclude:
            - '../src/Modules/Company/Entity/'
            - '../src/Modules/Company/DTO/'

    App\Modules\Deal\:
        resource: '../src/Modules/Deal/'
        exclude:
            - '../src/Modules/Deal/Entity/'
            - '../src/Modules/Deal/DTO/'

    App\Modules\Dashboard\:
        resource: '../src/Modules/Dashboard/'
        exclude:
            - '../src/Modules/Dashboard/Entity/'
            - '../src/Modules/Dashboard/DTO/'
